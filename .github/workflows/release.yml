name: Release

on:
  release:
    types: [published]

jobs:
  homebrew:
    if: false
    name: Bump Homebrew formula
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get clean version
        id: version
        run: echo "clean_version=$(echo ${{ github.event.release.tag_name }} | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Bump Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: dns-to-mdns
          homebrew-tap: blackhuman/homebrew-tap
          base-branch: main
          download-url: https://github.com/blackhuman/dns-to-mdns/releases/download/${{ github.event.release.tag_name }}/dns-to-mdns-${{ steps.version.outputs.clean_version }}-darwin-universal.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}

  homebrew-releaser:
    name: Release to Homebrew Tap (via homebrew-releaser)
    runs-on: ubuntu-latest
    steps:
      - name: Get clean version
        id: version
        run: echo "clean_version=$(echo ${{ github.event.release.tag_name }} | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Release project to Homebrew tap
        uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: blackhuman
          homebrew_tap: homebrew-tap
          github_token: ${{ secrets.COMMITTER_TOKEN }}
          
          # Custom tarball configuration for the universal binary
          custom_tarball: "dns-to-mdns-${{ steps.version.outputs.clean_version }}-darwin-universal"
          
          # Formula configuration
          install: 'bin.install "dns-to-mdns"'
          depends_on: 'macos: :monterey'
          test: 'system "#{bin}/dns-to-mdns", "--help"'
          
          # Inject the service block using formula_includes
          formula_includes: |
            service do
              run [opt_bin/"dns-to-mdns", "-p", "8053"]
              keep_alive true
              working_dir HOMEBREW_PREFIX
              log_path var/"log/dns-to-mdns.log"
              error_log_path var/"log/dns-to-mdns-error.log"
            end

